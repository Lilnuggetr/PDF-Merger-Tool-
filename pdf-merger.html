<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Merger</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e2e2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #7c6ff7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #888;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      width: 100%;
      max-width: 640px;
      padding: 32px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #3a3a5a;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #7c6ff7;
      background: rgba(124,111,247,0.06);
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-icon {
      font-size: 2.8rem;
      margin-bottom: 12px;
    }
    .drop-zone p {
      color: #aaa;
      font-size: 0.95rem;
    }
    .drop-zone strong {
      color: #a78bfa;
    }

    /* File list */
    #file-list {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #22223a;
      border: 1px solid #2e2e4a;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: grab;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .file-item:active { cursor: grabbing; }
    .file-item.dragging {
      opacity: 0.4;
    }
    .file-item.drag-target {
      border-color: #7c6ff7;
      background: #2a2040;
    }

    .drag-handle {
      color: #555;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .file-icon {
      color: #f87171;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .file-info {
      flex: 1;
      min-width: 0;
    }
    .file-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size {
      font-size: 0.75rem;
      color: #666;
      margin-top: 2px;
    }
    .page-count {
      font-size: 0.75rem;
      color: #7c6ff7;
      margin-top: 2px;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    /* Order hint */
    .order-hint {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
      margin-top: 10px;
    }

    /* Actions */
    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, #7c6ff7, #a78bfa);
      color: #fff;
    }
    .btn-primary:not(:disabled):hover { opacity: 0.88; }

    .btn-secondary {
      background: #2a2a3a;
      color: #bbb;
      border: 1px solid #3a3a5a;
    }
    .btn-secondary:not(:disabled):hover { background: #32324a; color: #ddd; }

    /* Progress */
    #progress-wrap {
      margin-top: 20px;
      display: none;
    }
    #progress-wrap.visible { display: block; }
    .progress-label {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      background: #22223a;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c6ff7, #a78bfa);
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #22223a;
      border: 1px solid #3a3a5a;
      color: #e2e2e2;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: #34d399; color: #34d399; }
    #toast.error   { border-color: #f87171; color: #f87171; }

    /* Output filename */
    .filename-row {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .filename-row label {
      font-size: 0.82rem;
      color: #888;
    }
    .filename-row input {
      background: #22223a;
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      color: #e2e2e2;
      padding: 9px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .filename-row input:focus { border-color: #7c6ff7; }

    .empty-hint {
      text-align: center;
      color: #444;
      font-size: 0.88rem;
      padding: 10px 0;
    }
  </style>
</head>
<body>

<h1>PDF Merger</h1>
<p class="subtitle">Combine multiple PDFs into one — fully in your browser</p>

<div class="card">
  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".pdf" multiple />
    <div class="drop-icon">📄</div>
    <p><strong>Click to browse</strong> or drag & drop PDF files here</p>
    <p style="margin-top:6px; font-size:0.8rem; color:#555;">You can add multiple files at once</p>
  </div>

  <!-- File list -->
  <div id="file-list"></div>
  <p class="order-hint" id="order-hint" style="display:none;">Drag items to reorder — merged output follows this order</p>

  <!-- Output filename -->
  <div class="filename-row">
    <label for="out-name">Output filename</label>
    <input type="text" id="out-name" value="merged.pdf" spellcheck="false" />
  </div>

  <!-- Progress -->
  <div id="progress-wrap">
    <p class="progress-label" id="progress-label">Merging…</p>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="actions">
    <button class="btn btn-secondary" id="clear-btn" disabled>Clear all</button>
    <button class="btn btn-primary" id="merge-btn" disabled>Merge PDFs</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const fileList    = document.getElementById('file-list');
  const orderHint   = document.getElementById('order-hint');
  const mergeBtn    = document.getElementById('merge-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const outName     = document.getElementById('out-name');
  const progressWrap= document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const toast       = document.getElementById('toast');

  let files = []; // { file, name, size, pages }
  let toastTimer;

  // ── Toast ─────────────────────────────────────────────────────────────────
  function showToast(msg, type = '') {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'show ' + type;
    toastTimer = setTimeout(() => { toast.className = ''; }, 3200);
  }

  // ── Format bytes ──────────────────────────────────────────────────────────
  function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }

  // ── Drag & drop on drop zone ───────────────────────────────────────────────
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  // ── Add files ──────────────────────────────────────────────────────────────
  async function addFiles(newFiles) {
    const pdfs = newFiles.filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
    if (pdfs.length !== newFiles.length) {
      showToast('Only PDF files are accepted', 'error');
    }
    for (const f of pdfs) {
      const pages = await getPageCount(f);
      files.push({ file: f, name: f.name, size: f.size, pages });
    }
    render();
  }

  async function getPageCount(file) {
    try {
      const buf = await file.arrayBuffer();
      const pdf = await PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
      return pdf.getPageCount();
    } catch { return '?'; }
  }

  // ── Render list ────────────────────────────────────────────────────────────
  function render() {
    fileList.innerHTML = '';
    const hasFiles = files.length > 0;
    mergeBtn.disabled = files.length < 2;
    clearBtn.disabled = !hasFiles;
    orderHint.style.display = hasFiles ? 'block' : 'none';

    if (!hasFiles) {
      fileList.innerHTML = '';
      return;
    }

    files.forEach((entry, idx) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.draggable = true;
      item.dataset.idx = idx;

      item.innerHTML = `
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="file-icon">📕</span>
        <div class="file-info">
          <div class="file-name" title="${entry.name}">${entry.name}</div>
          <div class="file-size">${fmtSize(entry.size)}</div>
          <div class="page-count">${entry.pages} page${entry.pages === 1 ? '' : 's'}</div>
        </div>
        <button class="remove-btn" data-idx="${idx}" title="Remove">✕</button>
      `;

      // Remove button
      item.querySelector('.remove-btn').addEventListener('click', e => {
        files.splice(Number(e.currentTarget.dataset.idx), 1);
        render();
      });

      // Reorder drag events
      item.addEventListener('dragstart', onDragStart);
      item.addEventListener('dragover',  onDragOver);
      item.addEventListener('dragleave', onDragLeave);
      item.addEventListener('drop',      onDrop);
      item.addEventListener('dragend',   onDragEnd);

      fileList.appendChild(item);
    });
  }

  // ── List reorder drag ──────────────────────────────────────────────────────
  let dragSrcIdx = null;

  function onDragStart(e) {
    dragSrcIdx = Number(this.dataset.idx);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcIdx);
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drag-target');
  }
  function onDragLeave() { this.classList.remove('drag-target'); }
  function onDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    const targetIdx = Number(this.dataset.idx);
    if (dragSrcIdx !== null && dragSrcIdx !== targetIdx) {
      const moved = files.splice(dragSrcIdx, 1)[0];
      files.splice(targetIdx, 0, moved);
      render();
    }
  }
  function onDragEnd() {
    document.querySelectorAll('.file-item').forEach(el => {
      el.classList.remove('dragging', 'drag-target');
    });
    dragSrcIdx = null;
  }

  // ── Clear ──────────────────────────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    files = [];
    render();
    progressWrap.classList.remove('visible');
  });

  // ── Merge ──────────────────────────────────────────────────────────────────
  mergeBtn.addEventListener('click', async () => {
    if (files.length < 2) return;

    mergeBtn.disabled = true;
    clearBtn.disabled = true;
    progressWrap.classList.add('visible');
    setProgress(0, 'Reading files…');

    try {
      const merged = await PDFLib.PDFDocument.create();

      for (let i = 0; i < files.length; i++) {
        const pct = Math.round((i / files.length) * 85);
        setProgress(pct, `Adding "${files[i].name}" (${i + 1}/${files.length})…`);

        const buf = await files[i].file.arrayBuffer();
        const src = await PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
        const pageIdxs = src.getPageIndices();
        const copied = await merged.copyPages(src, pageIdxs);
        copied.forEach(p => merged.addPage(p));
      }

      setProgress(95, 'Saving…');
      const bytes = await merged.save();

      setProgress(100, 'Done!');

      // Download
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = outName.value.trim() || 'merged.pdf';
      a.click();
      URL.revokeObjectURL(url);

      showToast('PDF merged and downloaded!', 'success');
    } catch (err) {
      console.error(err);
      showToast('Merge failed: ' + err.message, 'error');
    } finally {
      mergeBtn.disabled = files.length < 2;
      clearBtn.disabled = files.length === 0;
      setTimeout(() => progressWrap.classList.remove('visible'), 2000);
    }
  });

  function setProgress(pct, label) {
    progressBar.style.width = pct + '%';
    progressLbl.textContent = label;
  }
</script>
</body>
</html>
